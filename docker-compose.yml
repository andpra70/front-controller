services:
  front-controller:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker.io/andpra70/front-controller:latest
    container_name: front-controller
    restart: unless-stopped
    depends_on:
      - app-index
      - galleria
      - minicms
      - watermarks
      - catalogo-opere
      - crawler
      - calendario
    ports:
      - "9090:80"
    networks:
      - public-edge
      - internal-services

  app-index:
    image: docker.io/andpra70/app-index:latest
    container_name: app-index
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  galleria:
    image: docker.io/andpra70/galleria-virtuale:latest
    container_name: galleria-virtuale
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  minicms:
    image: docker.io/andpra70/minicms:latest
    container_name: minicms
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  watermarks:
    image: docker.io/andpra70/watermarks:latest
    container_name: watermark
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  catalogo-opere:
    image: docker.io/andpra70/catalogo-opere:latest
    container_name: catalogo-opere
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  crawler:
    image: docker.io/andpra70/crawler:latest
    container_name: crawler
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  calendario:
    image: docker.io/andpra70/calendario:latest
    container_name: calendario
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

networks:
  public-edge:
    driver: bridge
  internal-services:
    driver: bridge
    internal: true
