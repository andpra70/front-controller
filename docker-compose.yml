services:
  front-controller:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker.io/andpra70/front-controller:latest
    container_name: front-controller
    restart: unless-stopped
    depends_on:
      - app-index
      - galleria
      - minicms
      - watermarks
      - catalogo-opere
      - crawler
      - calendario
      - trumpet
      - plotterfun-node-editor
    ports:
      - "55000:55000"
      - "55443:55443"
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-check-certificate --quiet --spider https://127.0.0.1:55443/__monitoring__/ok || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - public-edge
      - internal-services
    volumes:
      - ./data/logs/nginx:/var/log/nginx

  app-index:
    image: docker.io/andpra70/app-index:latest
    container_name: app-index
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  galleria:
    image: docker.io/andpra70/galleria-virtuale:latest
    container_name: galleria-virtuale
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  minicms:
    image: docker.io/andpra70/minicms:latest
    container_name: minicms
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  watermarks:
    image: docker.io/andpra70/watermarks:latest
    container_name: watermark
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  catalogo-opere:
    image: docker.io/andpra70/catalogo-opere:latest
    container_name: catalogo-opere
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  crawler:
    image: docker.io/andpra70/crawler:latest
    container_name: crawler
    pull_policy: always
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - public-edge
      - internal-services

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpass}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-app}
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          mongosh --quiet --username "$$MONGO_INITDB_ROOT_USERNAME"
          --password "$$MONGO_INITDB_ROOT_PASSWORD"
          --authenticationDatabase admin
          --eval "db.adminCommand('ping').ok"
          | grep 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - public-edge
      - internal-services

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-rootpass}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-adminpass}
      ME_CONFIG_SITE_BASEURL: /mongo-express
    ports:
      - "${MONGO_EXPRESS_HOST_PORT:-8081}:8081"
    networks:
      - public-edge
      - internal-services

  calendario:
    image: docker.io/andpra70/calendario:latest
    container_name: calendario
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  trumpet:
    image: docker.io/andpra70/trumpet:latest
    container_name: front-controller-trumpet
    pull_policy: always
    restart: unless-stopped
    networks:
      - internal-services

  plotterfun-node-editor:
    image: ${IMAGE_REF:-docker.io/andpra70/plotterfun-node-editor:latest}
    container_name: plotterfun-node-editor
    restart: unless-stopped
    networks:
      - internal-services

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.1
    container_name: nginx-exporter
    restart: unless-stopped
    command:
      - --nginx.scrape-uri=http://front-controller:55000/__monitoring__/nginx_status
    depends_on:
      front-controller:
        condition: service_healthy
    networks:
      - internal-services

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    depends_on:
      front-controller:
        condition: service_healthy
    networks:
      - internal-services

  nginxlog-exporter:
    image: ghcr.io/martin-helmich/prometheus-nginxlog-exporter/exporter:v1
    container_name: nginxlog-exporter
    restart: unless-stopped
    command:
      - -config-file
      - /etc/prometheus-nginxlog-exporter/config.yml
    volumes:
      - ./nginxlog-exporter/config.yml:/etc/prometheus-nginxlog-exporter/config.yml:ro
      - ./data/logs/nginx:/var/log/nginx:ro
    depends_on:
      front-controller:
        condition: service_healthy
    networks:
      - internal-services

  nginx-logrotate:
    build:
      context: .
      dockerfile: docker/logrotate-nginx/Dockerfile
    image: front-controller-nginx-logrotate:latest
    container_name: nginx-logrotate
    restart: unless-stopped
    volumes:
      - ./data/logs/nginx:/var/log/nginx
      - ./logrotate/nginx:/etc/logrotate.d:ro
      - ./data/logs/nginx/logrotate-state:/var/lib/logrotate
    depends_on:
      - front-controller
    networks:
      - internal-services

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.external-url=https://${DOMAIN:-localhost}:55443/prometheus/
      - --web.route-prefix=/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - nginx-exporter
      - blackbox-exporter
      - nginxlog-exporter
    networks:
      - internal-services

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN:-localhost}:55443/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    networks:
      - internal-services

networks:
  public-edge:
    driver: bridge
  internal-services:
    driver: bridge
    internal: true

volumes:
  prometheus-data:
  grafana-data:
