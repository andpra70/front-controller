server {
    listen 55000;
    server_name _;
    return 308 https://$host:55443$request_uri;
}

server {
    listen 55443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 100m;

    location = / {
        try_files /index.html =404;
    }

    location = /__speedtest__/download {
        add_header Cache-Control "no-store";
        try_files /speedtest.bin =404;
    }

    location = /__speedtest__/upload {
        add_header Cache-Control "no-store";
        limit_except POST {
            deny all;
        }
        return 204;
    }

    location = /catalogo-opere {
        return 301 /catalogo-opere/;
    }

    location /catalogo-opere/ {
        proxy_pass http://catalogo-opere:6063/;
    }

    location = /galleria {
        return 301 /galleria/;
    }

    location /galleria/ {
        proxy_pass http://galleria:80/;
    }

    location = /minicms {
        return 301 /minicms/;
    }

    location /minicms/ {
        proxy_pass http://minicms:6061/;
    }

    location = /watermarks {
        return 301 /watermarks/;
    }

    location /watermarks/ {
        proxy_pass http://watermarks:80/;
    }

    location = /crawler {
        return 301 /crawler/;
    }

    location /crawler/ {
        proxy_pass http://crawler:80/;
    }

    location = /calendario {
        return 301 /calendario/;
    }

    location /calendario/ {
        proxy_pass http://calendario:80/;
    }

    location = /app-index {
        return 301 /app-index/;
    }

    location /app-index/ {
        proxy_pass http://app-index:80/;
    }

}
