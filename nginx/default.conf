log_format upstream_timing '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time" '
                          'ua="$upstream_addr" us="$upstream_status"';

limit_req_zone $binary_remote_addr zone=dos_guard:10m rate=5r/s;

server {
    listen 55000;
    server_name _;

    location = /__monitoring__/nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    return 308 https://$host:55443$request_uri;
}

server {
    listen 55443 ssl;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=30s ipv6=off;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 100m;
    limit_req_status 429;
    access_log /var/log/nginx/front-controller-access.log upstream_timing;

    location = / {
        try_files /index.html =404;
    }

    location = /__monitoring__/ok {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location = /__monitoring__/nginx_status {
        stub_status;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location = /__monitoring__/ko {
        access_log off;
        default_type application/json;
        return 503 '{"status":"ko"}';
    }

    location = /__monitoring__/dos {
        access_log off;
        default_type application/json;
        return 429 '{"status":"dos"}';
    }

    location = /__monitoring__/rate-limit {
        access_log off;
        limit_req zone=dos_guard burst=2 nodelay;
        default_type application/json;
        return 200 '{"status":"ok","probe":"rate-limit"}';
    }

    location = /__speedtest__/download {
        add_header Cache-Control "no-store";
        try_files /speedtest.bin =404;
    }

    location = /__speedtest__/upload {
        add_header Cache-Control "no-store";
        limit_except POST {
            deny all;
        }
        return 204;
    }

    location = /catalogo-opere {
        return 301 /catalogo-opere/;
    }

    location /catalogo-opere/ {
        proxy_pass http://catalogo-opere:6063/;
    }

    location = /galleria {
        return 301 /galleria/;
    }

    location /galleria/ {
        proxy_pass http://galleria:80/;
    }

    location = /minicms {
        return 301 /minicms/;
    }

    location /minicms/ {
        proxy_pass http://minicms:6061/;
    }

    location = /watermarks {
        return 301 /watermarks/;
    }

    location /watermarks/ {
        proxy_pass http://watermarks:80/;
    }

    location = /crawler {
        return 301 /crawler/;
    }

    location /crawler/ {
        proxy_pass http://crawler:80/;
    }

    location = /calendario {
        return 301 /calendario/;
    }

    location /calendario/ {
        proxy_pass http://calendario:80/;
    }

    location = /trumpet {
        return 301 /trumpet/;
    }

    location /trumpet/ {
        proxy_pass http://trumpet:80/;
    }

    location = /tuner {
        return 301 /tuner/;
    }

    location /tuner/ {
        proxy_pass http://tuner:80/;
    }

    location = /app-index {
        return 301 /app-index/;
    }

    location /app-index/ {
        proxy_pass http://app-index:80/;
    }

    location = /mongo-express {
        return 301 /mongo-express/;
    }

    location /mongo-express/ {
        set $mongo_express_upstream http://mongo-express:8081;
        proxy_pass $mongo_express_upstream;
    }

    location = /prometheus {
        return 301 /prometheus/;
    }

    location /prometheus/ {
        set $prometheus_upstream http://prometheus:9090;
        proxy_pass $prometheus_upstream;
    }

    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        set $grafana_upstream http://grafana:3000;
        proxy_pass $grafana_upstream;
    }

    location = /plotterfun-node-editor {
        return 301 /plotterfun-node-editor/;
    }

    location /plotterfun-node-editor/ {
        proxy_pass http://plotterfun-node-editor:80/;
    }

}
