listen:
  port: 4040
  address: 0.0.0.0
  metrics_endpoint: /metrics

namespaces:
  - name: sites
    format: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"'
    source:
      files:
        - /var/log/nginx/front-controller-access.log
    metrics_override:
      prefix: fc_site
    relabel_configs:
      - target_label: site
        from: request
        split: 2
        separator: ' '
        only_counter: false
        matches:
          - regexp: '^/([^/? ]+)/?.*'
            replacement: '$1'
          - regexp: '^/$'
            replacement: 'root'
          - regexp: '^.*$'
            replacement: 'other'
